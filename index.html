<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduAI Tutor</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: #f1f5f9;
            color: #172033;
        }

        header {
            background: #102a43;
            color: white;
            padding: 22px 18px;
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 30px;
        }

        header p {
            margin: 8px 0 0;
            color: #bcccdc;
            font-size: 15px;
        }

        main {
            max-width: 1120px;
            margin: 28px auto;
            padding: 0 18px;
        }

        .workspace {
            display: grid;
            grid-template-columns: minmax(300px, 1.15fr) minmax(280px, 0.85fr);
            gap: 20px;
            align-items: start;
        }

        .panel {
            background: white;
            border: 1px solid #d9e2ec;
            border-radius: 8px;
            box-shadow: 0 12px 26px rgba(16, 42, 67, 0.08);
            overflow: hidden;
        }

        .panel-head {
            padding: 16px 18px;
            border-bottom: 1px solid #d9e2ec;
            background: #f8fafc;
        }

        .panel-head h2 {
            margin: 0;
            color: #102a43;
            font-size: 19px;
        }

        .panel-body {
            padding: 18px;
        }

        #messages {
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 360px;
            max-height: 460px;
            overflow-y: auto;
            padding: 14px;
            border: 1px solid #d9e2ec;
            border-radius: 8px;
            background: #f8fafc;
        }

        .msg {
            max-width: 86%;
            padding: 11px 13px;
            border-radius: 8px;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        .user {
            align-self: flex-end;
            background: #2563eb;
            color: white;
        }

        .bot {
            align-self: flex-start;
            background: white;
            border: 1px solid #cbd5e1;
            color: #172033;
        }

        .bot strong {
            color: #102a43;
        }

        .quick-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 14px 0;
        }

        .chip {
            border: 1px solid #b6c5d6;
            background: #eef6ff;
            color: #1d4ed8;
            padding: 8px 10px;
            border-radius: 999px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
        }

        .row {
            display: flex;
            gap: 10px;
        }

        input {
            width: 100%;
            border: 1px solid #bcccdc;
            border-radius: 6px;
            color: #172033;
            font-size: 15px;
            padding: 12px;
        }

        input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.16);
            outline: none;
        }

        button {
            border: 0;
            border-radius: 6px;
            background: #2563eb;
            color: white;
            cursor: pointer;
            font-weight: 800;
            padding: 12px 16px;
            white-space: nowrap;
        }

        button:hover {
            background: #1d4ed8;
        }

        button:disabled {
            background: #94a3b8;
            cursor: wait;
        }

        .quiz-topic {
            display: grid;
            gap: 10px;
            margin-bottom: 16px;
        }

        #quiz-title {
            margin: 0 0 10px;
            color: #102a43;
            font-size: 18px;
        }

        .question-card {
            border: 1px solid #d9e2ec;
            border-radius: 8px;
            padding: 14px;
            margin-top: 12px;
            background: #ffffff;
        }

        .question-card p {
            margin: 0 0 10px;
            font-weight: 800;
        }

        .option {
            display: block;
            width: 100%;
            margin-top: 8px;
            border: 1px solid #cbd5e1;
            background: #f8fafc;
            color: #172033;
            text-align: left;
            font-weight: 700;
        }

        .option:hover {
            background: #e0f2fe;
        }

        .option.correct {
            border-color: #15803d;
            background: #dcfce7;
            color: #14532d;
        }

        .option.wrong {
            border-color: #b91c1c;
            background: #fee2e2;
            color: #7f1d1d;
        }

        #score {
            margin-top: 14px;
            padding: 12px;
            border-radius: 8px;
            background: #fff7ed;
            border: 1px solid #fed7aa;
            color: #7c2d12;
            font-weight: 800;
        }

        .empty {
            color: #64748b;
            border: 1px dashed #bcccdc;
            border-radius: 8px;
            padding: 22px;
            text-align: center;
            background: #f8fafc;
        }

        @media (max-width: 850px) {
            .workspace {
                grid-template-columns: 1fr;
            }

            .row {
                flex-direction: column;
            }

            .msg {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>EduAI Tutor</h1>
        <p>Ask a study question, get a simple explanation, then test yourself with a quiz.</p>
    </header>

    <main>
        <div class="workspace">
            <section class="panel" aria-labelledby="chat-title">
                <div class="panel-head">
                    <h2 id="chat-title">Chat Tutor</h2>
                </div>
                <div class="panel-body">
                    <div id="messages">
                        <div class="msg bot"><strong>Tutor:</strong> Ask me about photosynthesis, gravity, fractions, or the water cycle.</div>
                    </div>

                    <div class="quick-actions">
                        <button class="chip" onclick="askTopic('Explain photosynthesis')">Photosynthesis</button>
                        <button class="chip" onclick="askTopic('Explain gravity')">Gravity</button>
                        <button class="chip" onclick="askTopic('Explain fractions')">Fractions</button>
                        <button class="chip" onclick="askTopic('Explain water cycle')">Water Cycle</button>
                    </div>

                    <div class="row">
                        <input id="message" placeholder="Type your question here..." onkeydown="handleChatKey(event)">
                        <button id="sendBtn" onclick="send()">Send</button>
                    </div>
                </div>
            </section>

            <section class="panel" aria-labelledby="quiz-heading">
                <div class="panel-head">
                    <h2 id="quiz-heading">Interactive Quiz</h2>
                </div>
                <div class="panel-body">
                    <div class="quiz-topic">
                        <input id="topic" placeholder="Enter quiz topic, example: gravity" onkeydown="handleQuizKey(event)">
                        <button id="quizBtn" onclick="generateQuiz()">Generate Quiz</button>
                    </div>

                    <h3 id="quiz-title"></h3>
                    <div id="quiz" class="empty">Generate a quiz to see questions here.</div>
                    <div id="score" hidden></div>
                </div>
            </section>
        </div>
    </main>

    <script>
        let currentQuiz = [];
        let answered = {};

        function escapeHtml(text) {
            return String(text)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        function addMessage(type, html) {
            const messages = document.getElementById("messages");
            const bubble = document.createElement("div");
            bubble.className = "msg " + type;
            bubble.innerHTML = html;
            messages.appendChild(bubble);
            messages.scrollTop = messages.scrollHeight;
        }

        function formatTutorReply(data) {
            const steps = (data.steps || []).map(step => "<li>" + escapeHtml(step) + "</li>").join("");
            return "<strong>Tutor: " + escapeHtml(data.title || "Answer") + "</strong><br>" +
                escapeHtml(data.answer || "") +
                (steps ? "<ul>" + steps + "</ul>" : "");
        }

        function handleChatKey(event) {
            if (event.key === "Enter") {
                send();
            }
        }

        function handleQuizKey(event) {
            if (event.key === "Enter") {
                generateQuiz();
            }
        }

        function askTopic(text) {
            document.getElementById("message").value = text;
            document.getElementById("topic").value = text.replace("Explain ", "");
            send();
        }

        async function send() {
            const input = document.getElementById("message");
            const button = document.getElementById("sendBtn");
            const msg = input.value.trim();

            if (!msg) {
                input.focus();
                return;
            }

            addMessage("user", "<strong>You:</strong> " + escapeHtml(msg));
            input.value = "";
            button.disabled = true;
            button.innerText = "Thinking...";

            try {
                const res = await fetch("/chat", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({message: msg})
                });
                const data = await res.json();
                addMessage("bot", formatTutorReply(data));
            } catch (error) {
                addMessage("bot", "<strong>Tutor:</strong> I could not answer right now. Please try again.");
            } finally {
                button.disabled = false;
                button.innerText = "Send";
            }
        }

        async function generateQuiz() {
            const topicInput = document.getElementById("topic");
            const button = document.getElementById("quizBtn");
            const topic = topicInput.value.trim();

            if (!topic) {
                topicInput.focus();
                return;
            }

            button.disabled = true;
            button.innerText = "Making Quiz...";
            document.getElementById("quiz").className = "empty";
            document.getElementById("quiz").innerText = "Loading questions...";
            document.getElementById("score").hidden = true;

            try {
                const res = await fetch("/quiz", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({topic})
                });
                const data = await res.json();
                currentQuiz = data.questions || [];
                answered = {};
                renderQuiz(data.title || "Quiz", currentQuiz);
            } catch (error) {
                document.getElementById("quiz").className = "empty";
                document.getElementById("quiz").innerText = "Quiz could not load. Please try again.";
            } finally {
                button.disabled = false;
                button.innerText = "Generate Quiz";
            }
        }

        function renderQuiz(title, questions) {
            document.getElementById("quiz-title").innerText = title;
            const quizBox = document.getElementById("quiz");
            quizBox.className = "";
            quizBox.innerHTML = "";

            questions.forEach((item, questionIndex) => {
                const card = document.createElement("div");
                card.className = "question-card";
                card.innerHTML = "<p>" + (questionIndex + 1) + ". " + escapeHtml(item.question) + "</p>";

                item.options.forEach(option => {
                    const optionButton = document.createElement("button");
                    optionButton.className = "option";
                    optionButton.innerText = option;
                    optionButton.onclick = () => chooseAnswer(questionIndex, option, item.answer, card);
                    card.appendChild(optionButton);
                });

                quizBox.appendChild(card);
            });
        }

        function chooseAnswer(questionIndex, selected, correct, card) {
            if (answered[questionIndex]) return;

            answered[questionIndex] = selected === correct;
            const buttons = card.querySelectorAll(".option");
            buttons.forEach(button => {
                button.disabled = true;
                if (button.innerText === correct) {
                    button.classList.add("correct");
                } else if (button.innerText === selected) {
                    button.classList.add("wrong");
                }
            });

            updateScore();
        }

        function updateScore() {
            const answeredCount = Object.keys(answered).length;
            const correctCount = Object.values(answered).filter(Boolean).length;
            const score = document.getElementById("score");
            score.hidden = false;
            score.innerText = "Score: " + correctCount + " / " + currentQuiz.length +
                (answeredCount === currentQuiz.length ? " completed" : " answered");
        }
    </script>
</body>
</html>
